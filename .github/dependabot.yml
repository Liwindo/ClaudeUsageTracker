# .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: uv
    directory: "/python"
    schedule:
      interval: weekly
      day: monday
    groups:
      python-packages:
        patterns:
          - "*"
    ignore:
      - dependency-name: pyinstaller
        update-types: ["version-update:semver-major"]

  # NuGet bumps for the C# variant. No automerge: ci-csharp.yml runs the
  # xunit suite on these PRs, but merging stays a manual review step.
  - package-ecosystem: nuget
    directory: "/csharp"
    schedule:
      interval: weekly
      day: monday
    groups:
      nuget-packages:
        patterns:
          - "*"

  # Keeps the SHA-pinned actions in ci.yml / release.yml current —
  # Dependabot bumps the SHA and the version comment together.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns:
          - "*"
