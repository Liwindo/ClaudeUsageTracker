name: Release

# Releasing is a CI job. Run this workflow from the Actions tab (or
# `gh workflow run release.yml -f version=X.Y.Z`) and it does EVERYTHING that is
# allowed to happen off your machine: bump both variants, stamp the CHANGELOG,
# commit, tag, push, test, build, and publish a DRAFT release with four assets:
#   ClaudeUsageTracker.exe                   Python variant (portable)
#   ClaudeUsageTracker-Setup-X.Y.Z.exe       C# variant (per-user installer)
#   ClaudeUsageTracker-Portable-X.Y.Z.exe    C# variant (self-contained)
#   SHA256SUMS.txt                           checksums of the three EXEs
# The asset name scheme is API: both variants' update checkers and the README
# download links depend on it — never rename, only add.
#
# The ONE step that stays on your machine is signing the update manifest with the
# offline key (`scripts/publish_release.ps1 -Tag vX.Y.Z`), which also flips the
# draft to published. That is deliberate and is the whole trust anchor: CI never
# holds the signing key, so a compromised CI/GitHub cannot forge an update
# (REQUIREMENTS.md R-update-7).
#
# Pushing a `v*` tag by hand still works and skips straight to the build.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 2.3.0'
        required: true
        type: string
      dry_run:
        description: 'Rehearse only: bump, stamp and tag locally, push nothing, build nothing'
        type: boolean
        default: false
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Prepares the release commit+tag (dispatch) or just resolves the pushed tag,
  # then runs the guards: no build happens for a version the two variants do not
  # both carry, or whose CHANGELOG section is missing.
  prepare:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      # 'true' only when downstream jobs should build. A dry run stops here.
      proceed: ${{ steps.resolve.outputs.proceed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so the previous tag can be resolved

      - name: Resolve version and tag
        id: resolve
        shell: pwsh
        env:
          EVENT: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ($env:EVENT -eq 'workflow_dispatch') {
            $version = $env:INPUT_VERSION.Trim()
            if ($version -notmatch '^\d+\.\d+\.\d+$') {
              Write-Error "version must be X.Y.Z (got '$version')"; exit 1
            }
            if ($env:REF_NAME -ne 'master') {
              Write-Error "Release from master (dispatched from '$($env:REF_NAME)')."; exit 1
            }
            $tag = "v$version"
            if (git ls-remote --tags origin "refs/tags/$tag") {
              Write-Error "Tag $tag already exists."; exit 1
            }
            $proceed = if ($env:DRY_RUN -eq 'true') { 'false' } else { 'true' }
          } else {
            $tag = $env:REF_NAME
            $version = $tag -replace '^v', ''
            $proceed = 'true'
          }
          "tag=$tag"         | Out-File $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Append
          "proceed=$proceed" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "tag=$tag version=$version proceed=$proceed"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: github.event_name == 'workflow_dispatch'

      - name: Bump both variants
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: scripts/bump_version.ps1 ${{ steps.resolve.outputs.version }}

      - name: Stamp the CHANGELOG section
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          # Reuse an existing '## X.Y.Z' section, else stamp '## Unreleased' with
          # today's date. -Encoding UTF8 is REQUIRED: Get-Content defaults to
          # ANSI/CP1252 here, which mis-reads this UTF-8 file and corrupts every
          # em-dash/emoji when the text is written back.
          $version = $env:VERSION
          $text = Get-Content CHANGELOG.md -Raw -Encoding UTF8
          if ([regex]::IsMatch($text, "(?m)^## \[?$([regex]::Escape($version))\]?\b")) {
            Write-Host "Using the existing '## $version' section."
          } else {
            $dash = [char]0x2014  # em dash, matching the existing CHANGELOG style
            $date = Get-Date -Format 'yyyy-MM-dd'
            # Lookahead (not $) so the match ends BEFORE the line terminator: that
            # matches a CRLF '## Unreleased\r\n' line (where $ cannot anchor before
            # the \r) and leaves the \r\n intact, preserving the file's endings.
            $stamped = [regex]::Replace($text, "(?m)^## Unreleased[^\r\n]*(?=\r?\n|$)", "## $version $dash $date", 1)
            if ($stamped -eq $text) {
              Write-Error "CHANGELOG.md has neither a '## $version' section nor a '## Unreleased' block to stamp."
              exit 1
            }
            [IO.File]::WriteAllText("$PWD/CHANGELOG.md", $stamped)
            Write-Host "Stamped '## Unreleased' as '## $version $dash $date'."
          }

      - name: Commit and tag
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # Same identity as every other release commit in this repo (noreply
          # address — the real one is never exposed in a public commit).
          git config user.name  "Liwindo"
          git config user.email "13440774+Liwindo@users.noreply.github.com"
          git add -A
          # Re-running after a half-finished release must work: if the bump and
          # the CHANGELOG stamp are already committed, there is nothing to commit
          # and `git commit` would fail — tag that commit instead. `--name-only`
          # (not `--quiet`) because a non-zero exit is a terminating error here.
          $staged = git diff --cached --name-only
          if ($staged) {
            git commit -m "Release $env:TAG"
            if ($LASTEXITCODE -ne 0) { throw "git commit failed" }
          } else {
            Write-Host "Nothing to commit — sources already at this version."
          }
          git tag $env:TAG
          if ($LASTEXITCODE -ne 0) { throw "git tag failed" }
          if ($env:DRY_RUN -eq 'true') {
            Write-Host "::notice::Dry run - nothing pushed. Prepared commit:"
            git --no-pager show --stat HEAD
            exit 0
          }
          # Pushing with GITHUB_TOKEN does not re-trigger this workflow's
          # `push: tags` trigger, so the tag cannot start a second release run.
          git push origin HEAD:master $env:TAG
          if ($LASTEXITCODE -ne 0) { throw "git push failed" }

      - name: Verify both variants carry the tag's version
        shell: pwsh
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          $version = $env:VERSION
          $init = Get-Content python/src/claude_usage_monitor/__init__.py -Raw
          $py = [regex]::Match($init, '__version__ = "([^"]+)"').Groups[1].Value
          $csproj = [xml](Get-Content csharp/ClaudeUsageTracker/ClaudeUsageTracker.csproj -Raw)
          $cs = $csproj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1
          if ($py -ne $version -or $cs -ne $version) {
            Write-Error ("v$version does not match the sources: python=$py csharp=$cs. " +
              "Run scripts/bump_version.ps1 $version, commit, then re-tag.")
            exit 1
          }
          Write-Host "Version lockstep OK: tag=$version python=$py csharp=$cs"

      # Guard: extract this version's section from CHANGELOG.md. The release
      # FAILS if no section exists — a release can never ship with only the
      # auto-generated compare link again.
      - name: Extract release notes from CHANGELOG.md
        shell: pwsh
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          $version = $env:VERSION
          # Explicit UTF-8 so em-dashes/emoji in the notes never get mangled.
          $content = Get-Content CHANGELOG.md -Raw -Encoding UTF8
          $pattern = "(?ms)^## \[?$([regex]::Escape($version))\]?[^\r\n]*\r?\n(.*?)(?=^## |\z)"
          $m = [regex]::Match($content, $pattern)
          if (-not $m.Success -or -not $m.Groups[1].Value.Trim()) {
            Write-Error ("CHANGELOG.md has no section for version $version. " +
              "Add '## $version - <date>' with user-facing notes, then re-run.")
            exit 1
          }
          $m.Groups[1].Value.Trim() | Out-File release_notes.md -Encoding utf8
          # Append the compare link ourselves instead of generate_release_notes:
          # the auto-generated notes credit commit co-authors under
          # "New Contributors", which we deliberately keep out of releases.
          $prev = git describe --tags --abbrev=0 "$($env:TAG)^" 2>$null
          if ($prev) {
            Add-Content release_notes.md ("`n**Full Changelog**: " +
              "https://github.com/$($env:GITHUB_REPOSITORY)/compare/$prev...$($env:TAG)")
          }
          Write-Host "Release notes for ${version}:"
          Get-Content release_notes.md

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release_notes.md

  build-python:
    needs: prepare
    if: needs.prepare.outputs.proceed == 'true'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      # Non-immutable actions: pinned to commit SHAs (CodeQL supply-chain
      # hardening — tags can be moved, SHAs cannot).
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build EXE
        run: uv run pyinstaller ClaudeUsageTracker.spec --noconfirm

      - uses: actions/upload-artifact@v7
        with:
          name: python-exe
          path: python/dist/ClaudeUsageTracker.exe
          if-no-files-found: error

  build-csharp:
    needs: prepare
    if: needs.prepare.outputs.proceed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      # Runs the xunit suite as a gate, publishes both payloads, and compiles
      # the installer.
      - name: Build installer and portable EXE
        shell: pwsh
        run: csharp\build-release.ps1

      # build-release.ps1 only WARNS and skips the installer when ISCC is
      # missing — a release without the Setup asset must fail instead.
      - name: Verify both artifacts exist
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $version = $env:VERSION
          foreach ($name in @("ClaudeUsageTracker-Setup-$version.exe",
                              "ClaudeUsageTracker-Portable-$version.exe")) {
            if (-not (Test-Path "csharp/dist/$name")) {
              Write-Error "csharp/dist/$name missing after build"
              exit 1
            }
          }

      - uses: actions/upload-artifact@v7
        with:
          name: csharp-exes
          path: csharp/dist/ClaudeUsageTracker-*.exe
          if-no-files-found: error

  publish:
    needs: [prepare, build-python, build-csharp]
    if: needs.prepare.outputs.proceed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: assets

      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          $exes = Get-ChildItem assets -Recurse -Filter *.exe | Sort-Object Name
          $lines = $exes | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name
          }
          # ASCII content; no BOM so sha256sum-style tools can read it.
          [IO.File]::WriteAllLines("$PWD/SHA256SUMS.txt", $lines)
          Get-Content SHA256SUMS.txt

      - name: Publish release (as DRAFT — signed manifest is added before going live)
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          # Explicit: on a workflow_dispatch run github.ref is the branch, not
          # the tag the release belongs to.
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            assets/python-exe/ClaudeUsageTracker.exe
            assets/csharp-exes/ClaudeUsageTracker-*.exe
            SHA256SUMS.txt
          # Body comes exclusively from CHANGELOG.md (+ compare link) — no
          # auto-generated notes, no contributor credits.
          body_path: assets/release-notes/release_notes.md
          # CREATED AS A DRAFT ON PURPOSE. The in-app updater trusts only a
          # manifest signed by the OFFLINE key, which CI does not hold. The
          # release goes live only after `scripts/publish_release.ps1 -Tag vX.Y.Z`
          # signs the manifest locally, uploads update.json(+.sig) and flips the
          # draft to published. Because the update check follows releases/latest
          # (which ignores drafts), no client can ever see a release that lacks a
          # valid signed manifest. A forgotten signing step just leaves the
          # release as a draft — it can never ship an unsigned update.
          draft: true

      - name: How to finish this release
        shell: pwsh
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          Write-Host "::notice::Draft $env:TAG is built. Finish it locally with the offline key: scripts/publish_release.ps1 -Tag $env:TAG"
