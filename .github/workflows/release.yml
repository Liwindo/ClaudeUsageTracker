name: Release

# Pushing a tag like v1.4.0 runs the tests, builds the EXE, and publishes
# a GitHub release with the EXE attached and auto-generated notes.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      # Non-immutable actions: pinned to commit SHAs (CodeQL supply-chain
      # hardening — tags can be moved, SHAs cannot).
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build EXE
        run: uv run pyinstaller ClaudeUsageTracker.spec --noconfirm

      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: dist/ClaudeUsageTracker.exe
          generate_release_notes: true
