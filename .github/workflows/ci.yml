name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      # Non-immutable action: pinned to the v8.2.0 commit SHA (CodeQL
      # supply-chain hardening — tags can be moved, SHAs cannot).
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Byte-compile sources
        run: uv run python -m compileall -q src/claude_usage_monitor

      - name: Run tests
        run: uv run pytest -q
