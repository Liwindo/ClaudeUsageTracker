name: CI (Python)

# Path-filtered to the Python variant plus everything shared (scripts/,
# workflows). csharp/-only changes run ci-csharp.yml instead — which also
# means nuget Dependabot PRs never reach the automerge job below and stay
# open for manual review (deliberate).
on:
  push:
    branches: [master]
    paths: ['python/**', 'scripts/**', '.github/**']
  pull_request:
    paths: ['python/**', 'scripts/**', '.github/**']

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7

      # Non-immutable action: pinned to a commit SHA (CodeQL supply-chain
      # hardening — tags can be moved, SHAs cannot). Dependabot bumps the SHA
      # and the trailing version marker; keep this comment version-free.
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Validate lockfile matches pyproject.toml
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --extra dev

      # Post-Dependabot gate: action pins verified against their tags via the
      # GitHub API, version-free pin comments, dependabot.yml coverage, and
      # the .python-version pin. See the script docstring for the full list.
      - name: Validate dependency pins and supply chain
        run: uv run python ../scripts/validate_dependencies.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify C# locale catalogs match the Python source
        run: uv run python ../scripts/export_locales.py --check

      - name: Byte-compile sources
        run: uv run python -m compileall -q src/claude_usage_monitor

      - name: Run tests
        run: uv run pytest -q

  # Dependabot PRs additionally get a PyInstaller smoke build: pytest never
  # exercises the frozen EXE, so a bump that breaks packaging must fail here
  # before the automerge job can run.
  build-exe:
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7

      # Non-immutable action: pinned to a commit SHA (CodeQL supply-chain
      # hardening — tags can be moved, SHAs cannot). Dependabot bumps the SHA
      # and the trailing version marker; keep this comment version-free.
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build EXE
        run: uv run pyinstaller ClaudeUsageTracker.spec --noconfirm

      - name: Verify EXE was produced
        run: |
          if (-not (Test-Path dist/ClaudeUsageTracker.exe)) {
            Write-Error "dist/ClaudeUsageTracker.exe missing after build"
            exit 1
          }

  # Auto-merge Dependabot PRs once the jobs above pass. `needs` is the gate —
  # this job never runs if the suite, the validation, or the EXE smoke build
  # fails. Only patch/minor bumps are merged automatically; major bumps stay
  # open for manual review.
  automerge:
    needs: [test, build-exe]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Merge patch/minor bumps
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
