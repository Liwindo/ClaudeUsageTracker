name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      # Non-immutable action: pinned to a commit SHA (CodeQL supply-chain
      # hardening — tags can be moved, SHAs cannot). Dependabot bumps the SHA
      # and the trailing version marker; keep this comment version-free.
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Byte-compile sources
        run: uv run python -m compileall -q src/claude_usage_monitor

      - name: Run tests
        run: uv run pytest -q

  # Auto-merge Dependabot PRs once the tests above pass. `needs: test` is the
  # gate — this job never runs if the suite fails. Only patch/minor bumps are
  # merged automatically; major bumps stay open for manual review.
  automerge:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Merge patch/minor bumps
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
